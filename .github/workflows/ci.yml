name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
      - run: ./gradlew :shared:allTests --no-daemon

  build-android:
    needs: test-shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Write local.properties
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> local.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> local.properties
      - run: ./gradlew :androidApp:assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: "androidApp/build/outputs/apk/debug/*.apk"

  build-web:
    needs: test-shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - run: ./gradlew :webApp:jsBrowserDistribution --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: webApp/build/dist/js/productionExecutable/
